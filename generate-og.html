<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OG Image Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            width: 1200px; 
            height: 630px; 
            background: linear-gradient(135deg, #2C1810 0%, #5C4A2E 50%, #8B6F47 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            position: relative;
            overflow: hidden;
        }
        .ornament {
            position: absolute;
            font-size: 200px;
            opacity: 0.1;
            color: #D4AF37;
        }
        .top-left { top: -50px; left: -50px; }
        .bottom-right { bottom: -50px; right: -50px; }
        .content {
            text-align: center;
            color: white;
            z-index: 1;
            padding: 60px;
        }
        .label {
            font-family: 'Poppins', sans-serif;
            font-size: 24px;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: #D4AF37;
            margin-bottom: 30px;
        }
        .names {
            font-size: 72px;
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.2;
        }
        .guest-name {
            font-size: 36px;
            color: #D4AF37;
            margin: 30px 0;
            font-family: 'Poppins', sans-serif;
            font-weight: 300;
        }
        .date {
            font-size: 28px;
            letter-spacing: 4px;
            margin-top: 30px;
            opacity: 0.9;
        }
        .border {
            position: absolute;
            border: 3px solid #D4AF37;
            top: 30px;
            left: 30px;
            right: 30px;
            bottom: 30px;
            pointer-events: none;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="ornament top-left">🌿</div>
    <div class="ornament bottom-right">🌿</div>
    <div class="border"></div>
    
    <div class="content">
        <div class="label">The Wedding Of</div>
        <div class="names">Ahmad & Siti</div>
        <div class="guest-name" id="guestName">Kepada Yth. Tamu Undangan</div>
        <div class="date" id="eventDate">15 Agustus 2026</div>
    </div>

    <script>
        // Ambil parameter dari URL
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name') || 'Tamu Undangan';
        const event = params.get('event') || 'Pernikahan Ahmad & Siti';
        const date = params.get('date') || '15 Agustus 2026';
        
        document.getElementById('guestName').textContent = `Kepada Yth. ${name}`;
        document.title = `OG Image - ${name}`;
        
        // Auto download atau tampilkan gambar
        // Untuk production, Anda perlu server-side rendering
    </script>
</body>
</html>
